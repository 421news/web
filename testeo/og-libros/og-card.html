<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>OG card mockup — Libros de Juan Ruocco</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,wght@0,400;0,700;0,800;1,800;1,900&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --negro: #121212;
    --crema: #eae6e1;
    --amarillo: #fcd221;
    --verde: #17a583;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #555;
    font-family: 'Nunito Sans', sans-serif;
    padding: 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }

  .card-frame {
    width: 1200px;
    height: 630px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    overflow: hidden;
    position: relative;
    background: var(--crema);
  }

  .card-info {
    position: absolute;
    inset: 0;
    width: 480px;
    background: var(--crema);
    padding: 50px 40px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    z-index: 2;
    color: var(--negro);
  }

  .card-info::after {
    content: '';
    position: absolute;
    top: 0; right: -40px;
    width: 80px;
    height: 100%;
    background: var(--crema);
    transform: skewX(-8deg);
    z-index: 1;
  }

  .card-info > * { position: relative; z-index: 2; }

  /* Top strip */
  .card-eyebrow {
    font-size: 14px;
    font-weight: 800;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--verde);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .card-eyebrow::before {
    content: '';
    width: 24px; height: 3px;
    background: var(--verde);
    border-radius: 2px;
  }

  /* Title */
  .card-title {
    font-size: 78px;
    font-style: italic;
    font-weight: 900;
    line-height: 0.92;
    letter-spacing: -0.03em;
    margin-top: 18px;
  }
  .card-title .accent { color: var(--verde); }

  .card-subtitle {
    font-family: 'Lora', Georgia, serif;
    font-style: italic;
    font-size: 22px;
    line-height: 1.35;
    margin-top: 18px;
    color: var(--negro);
    opacity: 0.8;
  }

  /* Bottom row */
  .card-bottom {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .card-stat {
    background: var(--amarillo);
    border: 2px solid var(--negro);
    border-radius: 50%;
    width: 100px;
    height: 100px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transform: rotate(-8deg);
    font-style: italic;
    flex-shrink: 0;
  }
  .card-stat-num {
    font-size: 36px;
    font-weight: 900;
    line-height: 0.9;
    letter-spacing: -0.03em;
  }
  .card-stat-label {
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 2px;
    font-style: normal;
  }

  .card-domain {
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    opacity: 0.55;
  }

  /* Right: photo grid */
  .card-photos {
    position: absolute;
    top: 0;
    right: 0;
    bottom: 0;
    width: calc(100% - 460px);
    background: #ddd5c9; /* wood-tone backdrop entre fotos */
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 10px;
    padding: 10px;
  }

  .card-photo {
    background: #ddd5c9;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card-photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 62%;
    display: block;
  }

  /* Posiciones afinadas por libro */
  .card-photo.pos-democracia img { object-position: center 95%; }
  .card-photo.pos-coloso    img { object-position: center 30%; } /* sube vista para mostrar título */
  .card-photo.pos-3220      img {
    object-position: center 100%;
    transform: scale(1.1);
    transform-origin: center bottom;
  }
  .card-photo.pos-autopista img {
    object-position: center 100%;
    transform: scale(1.15);
    transform-origin: center bottom;
  }

  /* Frame caption (just label) */
  .card-frame-label {
    color: rgba(255,255,255,0.7);
    font-family: monospace;
    font-size: 12px;
    margin-top: 6px;
  }
</style>
</head>
<body>

  <!-- ===== OG CARD 1200x630 ===== -->
  <div class="card-frame">

    <div class="card-info">
      <div>
        <div class="card-eyebrow">421 Biblioteca</div>
        <h1 class="card-title"><span class="accent">Juan</span> Ruocco</h1>
        <p class="card-subtitle">
          Cuatro libros del director de 421. EPUB descargable y links de compra.
        </p>
      </div>

      <div class="card-bottom">
        <div class="card-stat">
          <div class="card-stat-num">04</div>
          <div class="card-stat-label">Libros</div>
        </div>
        <div class="card-domain">421.news / libros</div>
      </div>
    </div>

    <div class="card-photos">
      <div class="card-photo pos-democracia"><img src="img1.jpg" alt="¿La democracia en peligro?"></div>
      <div class="card-photo pos-coloso"><img src="img2.jpg" alt="El Coloso Justicialista"></div>
      <div class="card-photo pos-3220"><img src="img3.jpg" alt="3220"></div>
      <div class="card-photo pos-autopista"><img src="img4.jpg" alt="Autopista al Espacio"></div>
    </div>

  </div>
  <div class="card-frame-label">og-card — 1200 × 630</div>

</body>
</html>
