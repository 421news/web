<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>421 — Carta 3D Foil</title>
<style>
  :root {
    --bg-1: #1a0d2e;
    --bg-2: #0a0a1e;
    --accent: #f7d51d;
    --teal: #2dd4a8;
    --card-w: 360px;
    --card-h: 504px; /* 5:7 ratio */
    --card-d: 8px;   /* thickness */
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    min-height: 100vh;
    background: #0a0a14;
    color: #f5f5f5;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    overflow-x: hidden;
    user-select: none;
    -webkit-user-select: none;
  }

  /* Environment background — uses the card back as ambient backdrop */
  .env-bg {
    position: fixed;
    inset: -10%;
    z-index: -1;
    overflow: hidden;
    pointer-events: none;
  }
  .env-bg .env-layer {
    position: absolute;
    inset: 0;
    width: 120%;
    height: 120%;
    object-fit: cover;
    filter: blur(18px) brightness(0.65) saturate(1.3);
    transform: scale(1.25);
    transform-origin: center;
    animation: drift 28s ease-in-out infinite alternate;
  }
  .env-bg img.env-layer { display: none; }
  .env-bg::after {
    content: "";
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at center, transparent 0%, rgba(10,10,20,0.5) 70%, rgba(10,10,20,0.85) 100%),
      linear-gradient(180deg, rgba(10,10,20,0.3), rgba(10,10,20,0.6));
  }
  @keyframes drift {
    0%   { transform: scale(1.4) translate(0, 0) rotate(0deg); }
    100% { transform: scale(1.5) translate(-2%, 2%) rotate(2deg); }
  }
  .stage {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    gap: 24px;
  }
  .scene {
    width: var(--card-w);
    height: var(--card-h);
    perspective: 1600px;
    perspective-origin: 50% 50%;
    cursor: grab;
    touch-action: none;
  }
  .scene:active { cursor: grabbing; }

  .card {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transform: rotateX(0deg) rotateY(0deg);
    will-change: transform;
  }

  .face {
    position: absolute;
    overflow: hidden;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    background: #111;
  }

  /* Front and back: full card-w × card-h, offset on Z by half the thickness */
  .face.front, .face.back {
    width: var(--card-w);
    height: var(--card-h);
    border-radius: 18px;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.05),
      inset 0 0 0 1px rgba(255,255,255,0.08);
  }
  .face.front  { transform: translateZ(calc(var(--card-d) / 2)); }
  .face.back   { transform: translateZ(calc(var(--card-d) / -2)) rotateY(180deg); }

  /* Edge faces — thin strips around the perimeter */
  .edge {
    position: absolute;
    background: linear-gradient(90deg, #1a1a22, #2a2a35, #1a1a22);
    box-shadow: inset 0 0 4px rgba(0,0,0,0.6);
  }
  .edge.top, .edge.bottom {
    width: var(--card-w);
    height: var(--card-d);
    left: 0;
  }
  .edge.top    { top: 0;  transform: translateY(calc(var(--card-d) / -2)) rotateX(90deg); transform-origin: top; }
  .edge.bottom { bottom: 0; transform: translateY(calc(var(--card-d) / 2)) rotateX(-90deg); transform-origin: bottom; }

  .edge.left, .edge.right {
    width: var(--card-d);
    height: var(--card-h);
    top: 0;
  }
  .edge.left  { left: 0;  transform: translateX(calc(var(--card-d) / -2)) rotateY(-90deg); transform-origin: left; }
  .edge.right { right: 0; transform: translateX(calc(var(--card-d) / 2)) rotateY(90deg); transform-origin: right; }

  .face img, .face svg.placeholder {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    pointer-events: none;
    -webkit-user-drag: none;
  }

  /* Foil layers — multi-stack for a true holographic feel */
  .foil, .foil-stripes, .glitter, .shine, .rim {
    position: absolute;
    inset: 0;
    pointer-events: none;
    border-radius: 18px;
  }

  /* Layer 1: full-spectrum conic rainbow */
  .foil {
    mix-blend-mode: color-dodge;
    background:
      conic-gradient(
        from var(--foil-angle, 0deg) at var(--cx, 50%) var(--cy, 50%),
        rgba(255,0,128,0.7) 0deg,
        rgba(255,200,0,0.7) 50deg,
        rgba(0,255,150,0.7) 110deg,
        rgba(0,200,255,0.7) 170deg,
        rgba(120,0,255,0.7) 230deg,
        rgba(255,0,128,0.7) 290deg,
        rgba(255,200,0,0.7) 360deg
      );
    opacity: var(--foil-opacity, 0.75);
    filter: saturate(1.4) contrast(1.1);
    transition: opacity 0.2s;
  }

  /* Layer 2: diagonal prismatic stripes that shift like a CD's underside */
  .foil-stripes {
    mix-blend-mode: color-dodge;
    background:
      repeating-linear-gradient(
        var(--stripe-angle, 115deg),
        transparent 0px,
        rgba(255,255,255,0.0) 2px,
        rgba(255,0,200,0.18) 4px,
        rgba(0,255,255,0.18) 8px,
        rgba(255,255,0,0.18) 12px,
        rgba(0,255,150,0.18) 16px,
        transparent 22px
      );
    background-size: 250% 250%;
    background-position: var(--stripe-x, 50%) var(--stripe-y, 50%);
    opacity: 0.55;
  }

  /* Layer 3: glitter with twinkle */
  .glitter {
    mix-blend-mode: screen;
    background-image:
      radial-gradient(circle at 18% 28%, rgba(255,255,255,0.95) 0.6px, transparent 2px),
      radial-gradient(circle at 62% 22%, rgba(255,240,200,0.85) 0.6px, transparent 2px),
      radial-gradient(circle at 78% 58%, rgba(200,255,255,0.95) 0.6px, transparent 2px),
      radial-gradient(circle at 32% 72%, rgba(255,255,255,0.7) 0.6px, transparent 2px),
      radial-gradient(circle at 68% 88%, rgba(255,220,255,0.9) 0.6px, transparent 2px),
      radial-gradient(circle at 48% 48%, rgba(255,255,255,0.6) 0.6px, transparent 2px),
      radial-gradient(circle at 12% 92%, rgba(220,255,220,0.8) 0.6px, transparent 2px),
      radial-gradient(circle at 92% 12%, rgba(255,255,255,0.9) 0.6px, transparent 2px),
      radial-gradient(circle at 42% 18%, rgba(255,200,255,0.7) 0.6px, transparent 2px),
      radial-gradient(circle at 22% 52%, rgba(255,255,200,0.8) 0.6px, transparent 2px),
      radial-gradient(circle at 88% 42%, rgba(255,255,255,0.85) 0.6px, transparent 2px),
      radial-gradient(circle at 8% 38%, rgba(220,220,255,0.7) 0.6px, transparent 2px);
    background-size: 140% 140%;
    background-position: var(--gl-x, 50%) var(--gl-y, 50%);
    opacity: var(--gl-opacity, 0.75);
    animation: twinkle 2.4s ease-in-out infinite;
  }
  @keyframes twinkle {
    0%, 100% { filter: brightness(1) hue-rotate(0deg); }
    50%      { filter: brightness(1.6) hue-rotate(30deg); }
  }

  /* Layer 4: sharp specular hotspot tracking light */
  .shine {
    background:
      radial-gradient(
        ellipse 35% 25% at var(--mx, 50%) var(--my, 50%),
        rgba(255,255,255,0.85) 0%,
        rgba(255,255,255,0.35) 20%,
        transparent 50%
      ),
      radial-gradient(
        ellipse 80% 70% at var(--mx, 50%) var(--my, 50%),
        rgba(255,255,255,0.15) 0%,
        transparent 60%
      );
    mix-blend-mode: overlay;
    opacity: var(--shine-opacity, 0.9);
  }

  /* Layer 5: chromed rim — gradient stroke around the card */
  .rim {
    border-radius: 18px;
    box-shadow:
      inset 0 0 0 2px rgba(255,255,255,0.15),
      inset 0 0 0 4px rgba(0,0,0,0.2);
    background:
      linear-gradient(135deg,
        rgba(255,0,200,0.0) 0%,
        rgba(255,0,200,0.4) 10%,
        rgba(0,255,255,0.4) 30%,
        rgba(255,255,0,0.4) 50%,
        rgba(0,255,150,0.4) 70%,
        rgba(180,0,255,0.4) 90%,
        rgba(180,0,255,0.0) 100%);
    background-position: var(--rim-x, 50%) 50%;
    background-size: 200% 100%;
    -webkit-mask:
      linear-gradient(#000, #000) content-box,
      linear-gradient(#000, #000);
    -webkit-mask-composite: xor;
            mask-composite: exclude;
    padding: 3px;
    mix-blend-mode: screen;
    opacity: 0.6;
  }

  /* Controls */
  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    z-index: 10;
  }
  .btn {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    color: #fff;
    padding: 10px 18px;
    border-radius: 999px;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
    backdrop-filter: blur(8px);
    font-family: inherit;
  }
  .btn:hover {
    background: rgba(255,255,255,0.15);
    border-color: rgba(255,255,255,0.3);
  }
  .btn.primary {
    background: var(--accent);
    color: #1a0d2e;
    border-color: var(--accent);
    font-weight: 600;
  }
  .btn.primary:hover { background: #ffe14d; }
  input[type=file] { display: none; }

  .hint {
    font-size: 12px;
    opacity: 0.55;
    max-width: 460px;
    text-align: center;
    line-height: 1.5;
  }
  h1 {
    margin: 0;
    font-size: 18px;
    font-weight: 500;
    opacity: 0.7;
    letter-spacing: 0.5px;
  }
  h1 span { color: var(--accent); font-weight: 700; }
</style>
</head>

      <button class="btn" onclick="document.getElementById('fileFront').click()">Subir frente</button>
      <button class="btn" onclick="document.getElementById('fileBack').click()">Subir dorso</button>
      <button class="btn" onclick="document.getElementById('fileEnv').click()">Subir fondo</button>
      <input type="file" id="fileFront" accept="image/*">
      <input type="file" id="fileBack" accept="image/*">
      <input type="file" id="fileEnv" accept="image/*">
    </div>

    <p class="hint">Arrastrá con el mouse (o el dedo) para girar la carta libremente en 3D. Soltá rápido para que siga girando por inercia. Doble clic para dar vuelta. Podés arrastrar tus imágenes sobre la página y se cargan automáticamente.</p>
  </div>

<script>
(() => {
  const scene = document.getElementById('scene');
  const card  = document.getElementById('card');
  const imgFront = document.getElementById('img-front');
  const imgBack  = document.getElementById('img-back');

  // Rotation state (Euler-ish — accumulated)
  let rx = -8, ry = 18;        // current rotation
  let vrx = 0, vry = 0;        // angular velocity (deg per frame)
  let dragging = false;
  let lastX = 0, lastY = 0;
  let autoSpin = false;

  function render() {
    card.style.transform = `rotateX(${rx}deg) rotateY(${ry}deg)`;
    updateFoilFromRotation();
  }

  function updateFoilFromRotation() {
    // Map rotation to a virtual light/viewing angle.
    const nx = ((ry % 360) + 360) % 360 / 360; // 0..1
    const ny = ((rx % 360) + 360) % 360 / 360;

    // Conic rainbow rotates with ry, center shifts a bit with both axes.
    const conicAngle = (ry * 2) % 360;
    const cx = 50 + Math.sin(ry * Math.PI / 180) * 25;
    const cy = 50 + Math.sin(rx * Math.PI / 180) * 25;
    document.querySelectorAll('.foil').forEach(el => {
      el.style.setProperty('--foil-angle', conicAngle + 'deg');
      el.style.setProperty('--cx', cx + '%');
      el.style.setProperty('--cy', cy + '%');
    });

    // Prismatic stripes: angle subtly tilts with rx, position scrolls with ry
    const stripeAngle = 115 + rx * 0.4;
    const sx2 = (ry * 1.2) % 100;
    const sy2 = (rx * 0.8) % 100;
    document.querySelectorAll('.foil-stripes').forEach(el => {
      el.style.setProperty('--stripe-angle', stripeAngle + 'deg');
      el.style.setProperty('--stripe-x', sx2 + '%');
      el.style.setProperty('--stripe-y', sy2 + '%');
    });

    // Glitter slides slowly with rotation
    document.querySelectorAll('.glitter').forEach(el => {
      el.style.setProperty('--gl-x', (nx * 100) + '%');
      el.style.setProperty('--gl-y', (ny * 100) + '%');
    });

    // Sharp specular hotspot — opposite to rotation, like a fixed light catching the surface
    const mx = 50 - ry * 0.9;
    const my = 50 + rx * 0.9;
    document.querySelectorAll('.shine').forEach(el => {
      el.style.setProperty('--mx', Math.max(-20, Math.min(120, mx)) + '%');
      el.style.setProperty('--my', Math.max(-20, Math.min(120, my)) + '%');
    });

    // Chromatic rim slides
    document.querySelectorAll('.rim').forEach(el => {
      el.style.setProperty('--rim-x', (ry * 0.6) + '%');
    });
  }

  // Animation loop with inertia
  function tick() {
    if (!dragging) {
      if (autoSpin) {
        ry += 0.6;
      } else {
        // apply velocity with damping
        if (Math.abs(vrx) > 0.01 || Math.abs(vry) > 0.01) {
          rx += vrx;
          ry += vry;
          vrx *= 0.95;
          vry *= 0.95;
        }
      }
      render();
    }
    requestAnimationFrame(tick);
  }
  tick();

  // Pointer drag — works for mouse + touch via Pointer Events
  scene.addEventListener('pointerdown', (e) => {
    dragging = true;
    autoSpin = false;
    lastX = e.clientX;
    lastY = e.clientY;
    vrx = vry = 0;
    scene.setPointerCapture(e.pointerId);
  });
  scene.addEventListener('pointermove', (e) => {
    if (!dragging) return;
    const dx = e.clientX - lastX;
    const dy = e.clientY - lastY;
    lastX = e.clientX;
    lastY = e.clientY;
    // dragging right rotates the card around Y axis (positive)
    ry += dx * 0.6;
    rx -= dy * 0.6;
    // store velocity for inertia
    vry = dx * 0.6;
    vrx = -dy * 0.6;
    render();
  });
  function endDrag(e) {
    if (!dragging) return;
    dragging = false;
    try { scene.releasePointerCapture(e.pointerId); } catch(_) {}
  }
  scene.addEventListener('pointerup', endDrag);
  scene.addEventListener('pointercancel', endDrag);
  scene.addEventListener('pointerleave', endDrag);

  // Double click to flip 180 around Y
  scene.addEventListener('dblclick', () => {
    // animate to nearest +180 around Y
    const target = ry + 180;
    const start = ry;
    const t0 = performance.now();
    const dur = 600;
    function ease(t) { return t < 0.5 ? 2*t*t : 1 - Math.pow(-2*t+2, 2)/2; }
    function step(now) {
      const t = Math.min(1, (now - t0) / dur);
      ry = start + (target - start) * ease(t);
      render();
      if (t < 1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  });

  // Buttons
  document.getElementById('flipBtn').addEventListener('click', () => {
    scene.dispatchEvent(new Event('dblclick'));
  });
  document.getElementById('spinBtn').addEventListener('click', (e) => {
    autoSpin = !autoSpin;
    e.target.textContent = autoSpin ? 'Detener' : 'Auto-girar';
    if (autoSpin) { vrx = 0; vry = 0; }
  });
  document.getElementById('resetBtn').addEventListener('click', () => {
    autoSpin = false;
    document.getElementById('spinBtn').textContent = 'Auto-girar';
    rx = -8; ry = 18; vrx = vry = 0;
    render();
  });

  // Image loading
  const envImg = document.getElementById('env-img');
  const envSvg = document.getElementById('env-svg');
  let customEnvSet = false;
  function loadImage(file, target) {
    if (!file || !file.type.startsWith('image/')) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      target.src = e.target.result;
      target.style.display = 'block';
      const svg = target.parentElement && target.parentElement.querySelector('svg.placeholder');
      if (svg) svg.style.display = 'none';
      // If this is the back image and no custom env set, mirror it as background
      if (target.id === 'img-back' && !customEnvSet) {
        envImg.src = e.target.result;
        envImg.style.display = 'block';
        envSvg.style.display = 'none';
      }
    };
    reader.readAsDataURL(file);
  }
  function loadEnvImage(file) {
    if (!file || !file.type.startsWith('image/')) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      envImg.src = e.target.result;
      envImg.style.display = 'block';
      envSvg.style.display = 'none';
      customEnvSet = true;
    };
    reader.readAsDataURL(file);
  }
  document.getElementById('fileFront').addEventListener('change', (e) => {
    loadImage(e.target.files[0], imgFront);
  });
  document.getElementById('fileBack').addEventListener('change', (e) => {
    loadImage(e.target.files[0], imgBack);
  });
  document.getElementById('fileEnv').addEventListener('change', (e) => {
    loadEnvImage(e.target.files[0]);
  });

  // Drag-and-drop anywhere — first image -> front, second -> back, third -> env
  document.body.addEventListener('dragover', (e) => e.preventDefault());
  document.body.addEventListener('drop', (e) => {
    e.preventDefault();
    const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'));
    if (files[0]) loadImage(files[0], imgFront);
    if (files[1]) loadImage(files[1], imgBack);
    if (files[2]) loadEnvImage(files[2]);
  });

  // Auto-load files if they exist in the same folder
  function tryLoadByUrl(url, target, isEnv) {
    const test = new Image();
    test.onload = () => {
      target.src = url;
      target.style.display = 'block';
      const svg = target.parentElement && target.parentElement.querySelector('svg.placeholder');
      if (svg) svg.style.display = 'none';
      if (isEnv) {
        envSvg.style.display = 'none';
        customEnvSet = true;
      }
    };
    test.onerror = () => {};
    test.src = url + '?v=' + Date.now();
  }
  tryLoadByUrl('front.png', imgFront, false);
  tryLoadByUrl('back.png',  imgBack,  false);
  tryLoadByUrl('bg.png',    envImg,   true);
  // Also try .jpg variants
  setTimeout(() => {
    if (!imgFront.src || imgFront.style.display === 'none') tryLoadByUrl('front.jpg', imgFront, false);
    if (!imgBack.src  || imgBack.style.display  === 'none') tryLoadByUrl('back.jpg',  imgBack,  false);
    if (!customEnvSet) tryLoadByUrl('bg.jpg', envImg, true);
  }, 300);

  render();
})();
</script>
</body>
</html>
